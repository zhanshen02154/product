syntax = "proto3";

option go_package = "./proto/product";

package go.micro.service;

service Product {
  rpc AddProduct(ProductInfo) returns (ResponseProduct){}
  rpc GetProductSkuDetail(GetProductSkuDetailRequest) returns (GetProductSkuDetailResponse){}
  rpc CheckSkuInventoryThreshold(CheckSkuInventoryThresholdRequest) returns (CheckSkuInventoryThresholdResponse){}
  rpc GetSkuStockBySkuNo(GetSkuStockBySkuNoRequest) returns (GetSkuStockBySkuNoResponse){}
  rpc CreateRestockApply(CreateRestockApplyRequest) returns (CreateRestockApplyResponse){}
  rpc GetSkuSalesVolume(GetSkuSalesVolumeRequest) returns (GetSkuSalesVolumeResponse){}
  rpc GetSupplierInfo(GetSupplierInfoRequest) returns (GetSupplierInfoResponse){}
  rpc GetRestockApplyInfo(GetRestockApplyInfoRequest) returns (GetRestockApplyInfoResponse){}
  rpc GetSkuDailySales(GetSkuDailySalesRequest) returns (GetSkuDailySalesResponse){}
}

message ProductInfo {
  int64 id = 1;
  string product_name = 2;
  string product_sku = 3;
  double product_price = 4;
  string product_description = 5;
  int64 product_category_id = 6;
}

message ResponseProduct {
  int64 product_id = 1;
}

message GetProductSkuDetailRequest {
  int64 sku_id = 1;
}

message GetProductSkuDetailResponse {
  int64 id = 1;
  int64 product_id = 2;
  string sku_no = 3;
  string sku_name = 4;
  string spec_value_ids = 5;
  string spec_value_text = 6;
  double price = 7;
  double market_price = 8;
  uint32 stock = 9;
  uint32 stock_warn = 10;
  int32 sales = 11;
  string main_image = 12;
  int32 status = 13;
  string created_at = 14;
  string updated_at = 15;
  // 关联信息
  ProductBasicInfo product = 16;
  repeated SkuImageInfo images = 17;
}

message ProductBasicInfo {
  int64 id = 1;
  string product_no = 2;
  string product_name = 3;
  string main_image = 4;
  string description = 5;
}

message SkuImageInfo {
  int64 id = 1;
  string image_url = 2;
  bool is_main = 3;
  int32 display_order = 4;
}

// 批量检查SKU库存阈值请求
message CheckSkuInventoryThresholdRequest {
  repeated int64 sku_ids = 1;  // SKU ID列表
  uint32 threshold = 2;  // 可选阈值，为0时使用SKU自己的stock_warn值
}

// 单个SKU库存检查结果
message SkuInventoryCheckResult {
  int64 sku_id = 1;  // SKU ID
  string sku_no = 2;  // SKU编码
  string sku_name = 3;  // SKU名称
  uint32 stock = 4;  // 当前库存
  uint32 threshold = 5;  // 阈值
  bool is_sufficient = 6;  // 库存是否充足（stock >= threshold）
}

// 批量检查SKU库存阈值响应
message CheckSkuInventoryThresholdResponse {
  repeated SkuInventoryCheckResult results = 1;  // 检查结果列表
}

// 根据SKU编号查询库存请求
message GetSkuStockBySkuNoRequest {
  string sku_code = 1;  // SKU编号(SkuNo)
}

// 根据SKU编号查询库存响应
message GetSkuStockBySkuNoResponse {
  string sku_code = 1;       // SKU编号
  string name = 2;         // SKU名称
  uint32 stock = 3;        // 当前库存
  int32 status = 4;        // 商品状态（1上架 0下架）
  uint32 stock_warn = 5;   // 库存预警值
}

// 提交补货申请请求
message CreateRestockApplyRequest {
  string sku_id = 1;    // SKU编号(SkuNo)
  int32 user_id = 2;    // 用户ID（一律为-1）
  int32 quantity = 3;   // 补货数量（必须大于0）
  string reason = 4;    // 补货原因
}

// 提交补货申请响应
message CreateRestockApplyResponse {
  RestockRecordInfo restock_record = 1;  // 补货记录信息
  SkuBasicInfo sku_info = 2;              // SKU基本信息
}

// 补货记录信息
message RestockRecordInfo {
  int64 id = 1;             // 补货记录ID
  int32 user_id = 2;        // 用户ID
  uint64 sku_id = 3;        // SKU ID
  int32 quantity = 4;       // 补货数量
  string reason = 5;        // 补货原因
  uint32 status = 6;        // 补货状态：1=待订货 2=部分订货 3=已订货 4=失败
  string failed_reason = 7; // 失败原因
  string created_at = 8;    // 创建时间
}

// SKU基本信息
message SkuBasicInfo {
  int64 id = 1;              // SKU ID
  string sku_no = 2;         // SKU编号
  string sku_name = 3;       // SKU名称
  string spec_value_text = 4; // 规格值文本
}

// 查询SKU销量请求
message GetSkuSalesVolumeRequest {
  string sku_code = 1;    // SKU编号(SkuNo)
  string start_time = 2; // 开始时间（格式：2006-01-02 15:04:05），不填则默认为当天00:00:00
  string end_time = 3;   // 结束时间（格式：2006-01-02 15:04:05），不填则默认为当天23:59:59
}

// 查询SKU销量响应
message GetSkuSalesVolumeResponse {
  string sku_code = 1;         // SKU编号
  int64 sales_volume = 2;      // 销量
  double daily_avg_sales = 3;  // 日均销量
}

// 获取供应商信息请求
message GetSupplierInfoRequest {
  string sku_code = 1;          // SKU编号(SkuNo)
}

// 供应商信息项
message SupplierInfoItem {
  string sku_code = 1;                   // SKU编号
  int64 supplier_id = 2;                // 供应商 ID
  double supply_price = 3;              // 供应价
  int32 min_order_quantity = 4;         // 最小起订量
  bool is_preferred = 5;                // 是否首选
  SupplierDTO supplier = 6;             // 供应商信息
}

// 供应商数据传输对象
message SupplierDTO {
  int64 id = 1;                 // 供应商 ID
  string name = 2;              // 名称
  string contact_person = 3;    // 联系人
  string phone = 4;             // 联系电话
  string email = 5;             // 电子邮件
  string address = 6;           // 地址
  double rating = 7;            // 供应商评级
  int32 lead_time_days = 8;     // 交货周期（天）
  string payment_terms = 9;     // 支付条款
}

// 获取供应商信息响应
message GetSupplierInfoResponse {
  repeated SupplierInfoItem suppliers = 1;  // 供应商列表
}

// 获取SKU每日销量请求
message GetSkuDailySalesRequest {
  string sku_code = 1;    // SKU编号(SkuNo)
  string start_date = 2;  // 开始日期（格式：YYYY-MM-DD）
  string end_date = 3;    // 结束日期（格式：YYYY-MM-DD）
}

// SKU每日销量数据项
message DailySalesItem {
  string sku_code = 1;   // SKU编号
  int64 sales_volume = 2; // 当日销量
  string date = 3;        // 日期（格式：YYYY-MM-DD）
}

// 获取SKU每日销量响应
message GetSkuDailySalesResponse {
  repeated DailySalesItem daily_sales = 1;  // 每日销量列表
}

// 获取补货申请信息请求
message GetRestockApplyInfoRequest {
  string application_no = 1;  // 业务流水号
  int32 user_id = 2;         // 用户ID
}

// 补货审核信息
message RestockAuditInfo {
  int64 id = 1;                // ID
  int64 restock_id = 2;        // 补货记录ID
  uint32 audit_user_id = 3;    // 审核用户ID
  uint32 audit_status = 4;     // 审核状态：1=待审核 2=审核成功 3=审核失败
  string audit_failed_reason = 5;  // 审核失败原因
  string created_at = 6;       // 创建时间
  string updated_at = 7;       // 更新时间
}

// 获取补货申请信息响应
message GetRestockApplyInfoResponse {
  int64 id = 1;                // ID
  int64 sku_id = 2;            // SKU ID
  int32 quantity = 3;          // 补货数量
  string reason = 4;            // 补货原因
  uint32 status = 5;           // 状态（补货状态：1=待订货 2=部分订货 3=已订货 4=失败）
  string application_no = 6;   // 业务流水号
  RestockAuditInfo audit = 7;  // 最新一条审核信息
}